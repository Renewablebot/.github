name: Claude Security Review

on:
  workflow_call:

permissions:
  pull-requests: write
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - uses: anthropics/claude-code-security-review@main
        id: security-review
        with:
          comment-pr: true
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}

      - name: Comment on PR - success
        if: steps.security-review.outputs.findings-count == 0 && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Claude Security Review'));
            const body = '## 🛡️ Claude Security Review\n\n✅ **No security issues found.** Code changes look clean.\n\n---\n*Powered by Claude Code*';
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Block merge if security issues found
        if: steps.security-review.outputs.findings-count > 0
        run: |
          echo "::error::Security review found ${{ steps.security-review.outputs.findings-count }} issue(s). Fix them before merging."
          exit 1
